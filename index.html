<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD Styler</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="print.css">
    <link id="theme-stylesheet" rel="stylesheet" href="">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f0f0;
            color: #333;
        }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 20px;
            background: #fff;
            border-bottom: 1px solid #d6d6d6;
            height: 48px;
        }

        .toolbar .app-title {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            color: #121212;
            margin-right: auto;
        }

        .toolbar label {
            font-size: 12px;
            font-weight: 500;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .toolbar select {
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 13px;
            border: 1px solid #ccc;
            background: #fff;
            cursor: pointer;
            color: #333;
        }

        .toolbar select:focus {
            outline: none;
            border-color: #888;
        }

        .toolbar button {
            padding: 6px 16px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid #121212;
            background: #121212;
            color: #fff;
            cursor: pointer;
            transition: background 0.15s;
        }

        .toolbar button:hover {
            background: #333;
        }

        .main {
            display: flex;
            height: calc(100% - 48px);
        }

        .editor-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .editor-pane textarea {
            flex: 1;
            padding: 32px 28px;
            border: none;
            outline: none;
            resize: none;
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.7;
            background: #fafafa;
            color: #333;
            tab-size: 4;
            border-right: 1px solid #d6d6d6;
        }

        .editor-pane textarea::placeholder {
            color: #aaa;
        }

        .preview-pane {
            flex: 1;
            overflow-y: auto;
            background: #fff;
            min-width: 0;
        }

        .preview-content {
            max-width: 660px;
            margin: 0 auto;
            padding: 48px 40px 80px;
        }

        @page {
            size: A4;
            margin: var(--print-margin-top, 15mm)
                   var(--print-margin-right, 15mm)
                   var(--print-margin-bottom, 15mm)
                   var(--print-margin-left, 15mm);
        }

        @media print {
            .toolbar, .editor-pane {
                display: none !important;
            }

            .main {
                display: block;
                height: auto;
            }

            .preview-pane {
                overflow: visible;
            }

            .preview-content {
                max-width: none;
                padding: 0;
                margin: 0;
            }
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <span class="app-title">MD Styler</span>
        <label for="theme-select">Theme</label>
        <select id="theme-select"></select>
        <button id="export-btn">Export PDF</button>
    </div>

    <div class="main">
        <div class="editor-pane">
            <textarea id="editor" spellcheck="false" placeholder="Write your markdown here…"></textarea>
        </div>
        <div class="preview-pane">
            <div id="preview" class="preview-content"></div>
        </div>
    </div>

    <script>
        const THEMES = [
            { name: 'NY Domine',    file: 'themes/nytimes-domine.css' },
        ];

        const editor      = document.getElementById('editor');
        const preview      = document.getElementById('preview');
        const themeSelect  = document.getElementById('theme-select');
        const themeLink    = document.getElementById('theme-stylesheet');
        const exportBtn    = document.getElementById('export-btn');

        THEMES.forEach((t) => {
            const opt = document.createElement('option');
            opt.value = t.file;
            opt.textContent = t.name;
            themeSelect.appendChild(opt);
        });

        function loadTheme(file) {
            themeLink.href = file;
            localStorage.setItem('md-styler-theme', file);
        }

        const saved = localStorage.getItem('md-styler-theme');
        if (saved && THEMES.some(t => t.file === saved)) {
            themeSelect.value = saved;
            loadTheme(saved);
        } else {
            loadTheme(THEMES[0].file);
        }

        themeSelect.addEventListener('change', () => loadTheme(themeSelect.value));

        marked.setOptions({ breaks: true, gfm: true });

        function render() {
            let html = marked.parse(editor.value);
            html = html.replace(/ ([·—–])/g, '\u00A0$1');
            html = html.replace(/([—–]) /g, '$1\u00A0');
            html = html.replace(/(\d) ([%°])/g, '$1\u00A0$2');
            preview.innerHTML = html;
        }

        editor.addEventListener('input', render);

        editor.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = editor.selectionStart;
                const end = editor.selectionEnd;
                editor.value = editor.value.substring(0, start) + '    ' + editor.value.substring(end);
                editor.selectionStart = editor.selectionEnd = start + 4;
                render();
            }
        });

        exportBtn.addEventListener('click', async () => {
            const firstLine = editor.value.split('\n').find(l => l.trim()) || 'document';
            document.title = firstLine.replace(/^#+\s*/, '').trim();
            await document.fonts.ready;
            window.print();
            document.title = 'MD Styler';
        });

        const savedContent = localStorage.getItem('md-styler-content');
        if (savedContent) {
            editor.value = savedContent;
        } else {
            editor.value = `# Jane Smith

**Senior Software Engineer**
San Francisco, CA · jane@email.com · (555) 123-4567

---

## Experience

### Lead Engineer — Acme Corp
*January 2022 – Present*

- Architected and shipped a real-time analytics platform serving 2M+ daily active users
- Led a cross-functional team of 8 engineers across frontend and infrastructure
- Reduced API response times by 40% through systematic performance optimization

### Software Engineer — StartupCo
*June 2019 – December 2021*

- Built the core payment processing pipeline handling $50M+ in annual transactions
- Designed and implemented a microservices architecture reducing deployment times by 60%
- Mentored 3 junior engineers through structured onboarding and 1-on-1 programs

---

## Education

### B.S. Computer Science — Stanford University
*Class of 2019* · GPA 3.8

---

## Skills

**Languages:** Python, TypeScript, Go, SQL
**Frameworks:** React, Node.js, Django, FastAPI
**Infrastructure:** AWS, Kubernetes, Terraform, PostgreSQL
`;
        }

        render();

        editor.addEventListener('input', () => {
            localStorage.setItem('md-styler-content', editor.value);
        });
    </script>
</body>
</html>
